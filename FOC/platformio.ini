; =============================================================
; hoverboard-firmware-hack-FOC-USART3 — PlatformIO config
; =============================================================

[platformio]
default_envs = ONE_AXIS_USART_VARIANT
src_dir       = Src
include_dir   = Inc

[env]
framework   = stm32cube
build_flags =
    -IInc
    -std=gnu11
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections

; STM32F103RC — ST-Link
; pio run -e ONE_AXIS_USART_VARIANT -t upload
[env:ONE_AXIS_USART_VARIANT]
platform        = ststm32
board           = genericSTM32F103RC
upload_protocol = stlink
debug_tool      = stlink
build_flags     =
    ${env.build_flags}
    -DONE_AXIS_USART_VARIANT

; GD32F103RC — ST-Link clone
; pio run -e GD32F103RC_stlink -t upload
[env:GD32F103RC_stlink]
platform        = ststm32
board           = genericSTM32F103RC
upload_protocol = stlink
debug_tool      = stlink
build_flags     =
    ${env.build_flags}
    -DONE_AXIS_USART_VARIANT
    -DGD32F103Rx        ; clock 108MHz (HSI/2 x27)
    -DBOARD_GD32        ; inverte IC2Polarity do TIM4 (encoder conta ao contrario no GD32)

; GD32F103RC — UART bootloader (USB-Serial)
; BOOT0=HIGH -> alimentar -> gravar -> BOOT0=LOW -> RESET
; Trocar COM4 pela porta real
; pio run -e GD32F103RC_uart -t upload
[env:GD32F103RC_uart]
platform        = ststm32
board           = genericSTM32F103RC
upload_protocol = serial
upload_port     = COM4
upload_speed    = 115200
build_flags     =
    ${env.build_flags}
    -DONE_AXIS_USART_VARIANT
    -DGD32F103Rx
    -DBOARD_GD32
